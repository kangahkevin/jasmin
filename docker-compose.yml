services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    hostname: rabbitmq
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
    environment:
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_prometheus return_per_object_metrics true"
    volumes:
      - rabbitmq:/var/lib/rabbitmq/mnesia
    ports:
      - "15672:15672"
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping | grep PONG
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis:/data
    ports:
      - "6379:6379"
    security_opt:
      - no-new-privileges:true

  jasmin:
    build:
      context: ./
      dockerfile: ./docker/Dockerfile
    image: kekantek/jasmin:0.12
    container_name: jasmin
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "2775:2775"
      - "8990:8990"
      - "1401:1401"
      - "9001:9001"
      - "8080:8080"
    healthcheck:
      test: curl -s http://localhost:1401/ping | grep -q PONG
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - jasmin_supervisor:/etc/supervisor/conf.d
      - jasmin_store:/etc/jasmin/store
      - jasmin_scripts:/etc/jasmin/scripts
      - jasmin_cron:/etc/jasmin/cron
      - jasmin_logs:/var/log/jasmin
    security_opt:
      - no-new-privileges:true

  fakesmsc:
    image: kekantek/fakesmsc:latest
    restart: unless-stopped
    container_name: fakesmsc

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/config/prometheus.yml:/etc/prometheus/prometheus.yml
      - monitoring_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    depends_on:
      - jasmin
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-simple-json-datasource"
    volumes:
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/opt/grafana-dashboards:ro

      - monitoring_data:/var/lib/grafana
    depends_on:
      - prometheus
    security_opt:
      - no-new-privileges:true

volumes:
  jasmin_supervisor: {}
  jasmin_store: {}
  jasmin_scripts: {}
  jasmin_cron: {}
  jasmin_logs: {}
  monitoring_data: {}
  rabbitmq: {}
  redis: {}

networks:
  default:
    external: true
    name: jasmin
